<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Checkout — ShopX</title>
  <link rel="stylesheet" href="style.css">
  <script src="auth-guard.js"></script>
</head>
<body>

<!-- NAVBAR -->
<div class="navbar">
  <h2>🛒 Checkout</h2>
  <a href="cart.html">← Back to Cart</a>
</div>

<div class="checkout-container">
  <p class="section-title" style="padding-left:0; margin-top:20px;">Order Summary</p>
  
  <!-- ITEM SUMMARY LIST -->
  <div id="checkout-summary-items" style="margin-bottom: 20px; display: flex; flex-direction: column; gap: 10px;">
    <!-- Rendered dynamically via checkout.js -->
  </div>

  <div class="total-summary">
    Total: ₹<span id="total">0</span>
  </div>

  <hr style="border: 0; border-top: 1px solid var(--border); margin: 24px 0;">

  <p class="section-title" style="padding-left:0;">Delivery Details</p>
  
  <!-- DELIVERY FORM -->
  <div class="form-group">
    <label for="name">Full Name</label>
    <input type="text" id="name" placeholder="Enter your full name">
  </div>

  <div class="form-group">
    <label for="address">Delivery Address</label>
    <input type="text" id="address" placeholder="Enter your delivery address">
  </div>

  <div class="form-group">
    <label for="phone">Phone Number</label>
    <input type="text" id="phone" placeholder="Enter your phone number">
  </div>

  <button class="btn-primary" onclick="placeOrder()" style="width: 100%; margin-top: 20px; padding: 14px;">Place Order</button>
</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="index.html"><span class="icon">🏠</span>Home</a>
  <a href="cart.html" class="active"><span class="icon">🛍️</span>Cart</a>
  <a href="orders.html"><span class="icon">📦</span>Orders</a>
  <a href="profile.html"><span class="icon">👤</span>Profile</a>
</div>

<script src="products.js"></script>
<script src="checkout.js"></script>
</body>
</html>
