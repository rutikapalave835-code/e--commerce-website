<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login — ShopX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-box">
  <h2>Login</h2>
  <p class="subtitle">Welcome back! Please sign in to your account</p>

  <div class="form-group">
    <label for="loginUser">Username</label>
    <input type="text" id="loginUser" placeholder="Enter your username">
  </div>

  <div class="form-group">
    <label for="loginPass">Password</label>
    <input type="password" id="loginPass" placeholder="Enter your password">
  </div>

  <button class="btn-primary" onclick="login()">Login</button>

  <p class="auth-link">New user? <a href="signup.html">Signup</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
