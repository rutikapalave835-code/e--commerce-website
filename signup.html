<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Signup — ShopX</title>
  <link rel="stylesheet" href="style.css">
</head>
<body class="auth-page">

<div class="auth-box">
  <h2>Signup</h2>
  <p class="subtitle">Create a new account to start shopping</p>

  <div class="form-group">
    <label for="username">Username</label>
    <input type="text" id="username" placeholder="Choose a username">
  </div>

  <div class="form-group">
    <label for="password">Password</label>
    <input type="password" id="password" placeholder="Choose a password">
  </div>

  <button class="btn-primary" onclick="signup()">Signup</button>

  <p class="auth-link">Already have an account? <a href="login.html">Login</a></p>
</div>

<script src="auth.js"></script>
</body>
</html>
